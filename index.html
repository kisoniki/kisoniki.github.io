<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musicdle - Adivinhe a Música!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Modal de seleção de modo de jogo -->
        <div id="modeSelectionModal" class="mode-modal">
            <div class="mode-modal-content">
                <h2>🎮 Escolha o Modo de Jogo</h2>
                
                <button class="mode-btn mode-btn-random" onclick="iniciarModoAleatorio()">
                    <span class="mode-icon">🎲</span>
                    <span class="mode-title">Aleatório</span>
                    <span class="mode-desc">Adivinhe uma música aleatória</span>
                </button>
                
                <button class="mode-btn mode-btn-challenge" onclick="abrirSeletorMusicas()">
                    <span class="mode-icon">🎯</span>
                    <span class="mode-title">Desafio</span>
                    <span class="mode-desc">Escolha a música e desafie amigos</span>
                </button>
                
                <button class="mode-btn mode-btn-lyrics" onclick="iniciarModoVerso()">
                    <span class="mode-icon">✍️</span>
                    <span class="mode-title">Verso</span>
                    <span class="mode-desc">Adivinhe a música pelo verso</span>
                </button>
            </div>
        </div>

        <!-- Modal de seleção de música para desafio -->
        <div id="musicSelectorModal" class="mode-modal hidden">
            <div class="mode-modal-content music-selector-content">
                <h2>🎵 Escolha a Música para o Desafio</h2>
                
                <input 
                    type="text" 
                    id="musicSearchInput" 
                    class="music-search-input" 
                    placeholder="Pesquise pela música ou artista..."
                    oninput="filtrarMusicasParaDesafio(this.value)"
                >
                
                <div id="musicSelectorList" class="music-selector-list">
                    <!-- As músicas vão aparecer aqui -->
                </div>
            </div>
        </div>
        <!-- Cabeçalho -->
        <header class="header">
            <h1>🎵 Musicdle</h1>
            <p class="subtitle">Adivinhe a música do dia!</p>
            <button id="changeModeBtn" class="btn-change-mode" onclick="abrirSeletorDeModo()">🔁 Trocar modo</button>
        </header>

        <!-- Área do jogo -->
        <main class="game-area">
            <!-- Display do jogo -->
            <div class="music-display">
                <div class="album-art">🎭</div>
                <p class="music-info" id="musicInfoText">Adivinhe a música pelos seus chutes!</p>
                <p class="verse-clue hidden" id="verseClue">Verso será exibido aqui (modo verso).</p>
            </div>

            <!-- Campo de input com autocomplete -->
            <div class="input-section">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="guessInput" 
                        class="input-field" 
                        placeholder="Digite o nome da música" 
                        autocomplete="off"
                    >
                    <div id="suggestionsList" class="suggestions-list hidden"></div>
                </div>
                <button id="guessBtn" class="btn-guess">Chutar</button>
            </div>

            <!-- Mensagem de feedback -->
            <div id="feedback" class="feedback hidden"></div>

            <!-- Sistema de dicas desbloqueáveis -->
            <div id="hintsUnlock" class="hints-unlock hidden">
                <button id="unlockArtistaBtn" class="hint-unlock-btn hidden" onclick="revelarArtista()">
                    🔓 Revelar Artista (3+ erros)
                </button>
                <button id="unlockObraBtn" class="hint-unlock-btn hidden" onclick="revelarObra()">
                    🔓 Revelar Obra (5+ erros)
                </button>
                <button id="unlockPersonagemBtn" class="hint-unlock-btn hidden" onclick="revelarPersonagem()">
                    🔓 Revelar Personagem (10+ erros)
                </button>
                <button id="giveUpBtn" class="hint-unlock-btn hidden" onclick="revelarMusica()">
                    ⛔ Desistir e revelar música (12+ erros)
                </button>
            </div>

            <!-- Dicas reveladas -->
            <div id="revealedHints" class="revealed-hints hidden">
                <div id="obraRevealed" class="hint-revealed hidden">
                    <span class="hint-revealed-label">Obra:</span>
                    <span id="obraText" class="hint-revealed-value"></span>
                </div>
                <div id="artistaRevealed" class="hint-revealed hidden">
                    <span class="hint-revealed-label">Artista:</span>
                    <span id="artistaText" class="hint-revealed-value"></span>
                </div>
                <div id="personagemRevealed" class="hint-revealed hidden">
                    <span class="hint-revealed-label">Personagem:</span>
                    <span id="personagemText" class="hint-revealed-value"></span>
                </div>
            </div>

            <!-- Botão para nova rodada (aparece após vitória) -->
            <button id="newGameBtn" class="btn-new-game hidden">Próxima Música</button>

            <!-- Tabela de tentativas com dicas -->
            <div class="attempts-section">
                <h3>📊 Seus Chutes</h3>
                <div id="attemptsTable" class="attempts-table">
                    <p class="empty-state">Nenhum chute ainda</p>
                </div>
            </div>
        </main>

        <!-- Rodapé -->
        <footer class="footer">
            <p>Criado com ❤️ para amantes de música</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
